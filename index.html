<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韦特大阿卡纳塔罗（测试版）</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>韦特大阿卡纳塔罗（测试版）</h1>
    <p id="subtitle" class="subtitle"></p>

    <section class="panel">
      <label for="questionType">问题类型</label>
      <select id="questionType">
        <option value="love">感情</option>
        <option value="work">工作</option>
        <option value="emotion">情绪</option>
        <option value="growth">自我成长</option>
      </select>

      <div class="question-block">
        <div class="label-row">
          <label id="question-input-label" for="question-input"></label>
          <button id="help-toggle" class="help-toggle" type="button" aria-expanded="false">?</button>
        </div>

        <input
          id="question-input"
          type="text"
          maxlength="120"
          autocomplete="off"
        />

        <div id="help-content" class="help-content" hidden></div>
      </div>

      <p id="pre-draw-tip" class="micro-copy"></p>
      <p id="choose-card-tip" class="micro-copy" hidden></p>
      <p id="result-lead" class="micro-copy" hidden></p>

      <div class="button-row">
        <button id="shuffleBtn">开始洗牌</button>
      </div>

      <div id="drawArea" class="draw-area hidden">
        <p class="draw-tip">请选择一张牌</p>
        <div class="card-choices">
          <button class="card-back" data-choice="0" type="button">
            <img src="/assets/tarotback.png" alt="牌背" />
          </button>
          <button class="card-back" data-choice="1" type="button">
            <img src="/assets/tarotback.png" alt="牌背" />
          </button>
          <button class="card-back" data-choice="2" type="button">
            <img src="/assets/tarotback.png" alt="牌背" />
          </button>
        </div>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>抽牌结果</h2>

      <div id="resultCard" class="result-card hidden">
        <div class="card-visual" id="cardVisual">正在洗牌…</div>

        <div class="result-text">
          <p><strong>牌名：</strong><span id="cardName">-</span></p>

          <div class="orientation-row">
            <p><strong>方向：</strong><span id="cardOrientation">-</span></p>
            <button id="orientationHelpToggle" class="help-toggle" type="button" aria-label="正位与逆位说明">?</button>
          </div>

          <div id="orientationHelpBox" class="help-box hidden">
            <p><strong>正位 / 逆位是什么意思？</strong></p>
            <p>正位和逆位并不代表“好”或“坏”，而是不同的状态与角度。</p>
            <p>正位通常更直接、外显；逆位可能代表内在、延迟、受阻或转化中的状态。</p>
          </div>

          <p><strong>本次主调：</strong><span id="cardKeywords">-</span></p>
          <p><strong>解读：</strong></p>
          <div id="cardReading" class="reading-box">-</div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        点击上方按钮，先抽一张牌。
      </div>
    </section>
    <footer class="footer-note">
  <p>
    Made by <strong>Shumin Zhang</strong> ·
    <a
      href="https://github.com/suzakuzhang/tarot-local-test"
      target="_blank"
      rel="noopener noreferrer"
    >
      GitHub
    </a>
  </p>
  <p>如果你喜欢这个项目，欢迎在 GitHub 上点亮star。</p>
</footer>
  </main>

  <script src="/script.js"></script>
</body>
</html>
