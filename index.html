<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 塔罗解读（测试版）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>AI 塔罗解读（测试版）</h1>
    <p class="subtitle">借助塔罗牌的象征图像，帮助你整理问题与感受。</p>

    <section class="panel">
      <label for="questionType">问题类型</label>
      <select id="questionType">
        <option value="love">感情</option>
        <option value="work">工作</option>
        <option value="emotion">情绪</option>
        <option value="growth">自我成长</option>
      </select>

      <div class="question-label-row">
        <label for="questionText">补充一句问题（可不填）</label>
        <button id="preHelpToggle" class="help-toggle" type="button" aria-label="如何提问">?</button>
      </div>

      <div id="preHelpBox" class="help-box hidden">
        <p><strong>怎么问会更有帮助？</strong> 比起直接追问结果，更适合问一个具体、近期、可行动的问题，例如“我现在该注意什么？”或“我可以怎么改善这段关系？”</p>
        <p><strong>为什么不要反复问同一个问题？</strong> 同一个问题在情况没有变化前反复抽取，往往只会让信息变得更混乱。</p>
      </div>

      <textarea
        id="questionText"
        rows="3"
        placeholder="比如：我现在该怎么改善这段关系的沟通？"
      ></textarea>

      <div class="button-row">
        <button id="drawBtn">洗牌并抽牌</button>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>抽牌结果</h2>

      <div id="resultCard" class="result-card hidden">
        <div class="card-visual" id="cardVisual">正在洗牌…</div>

        <div class="result-text">
          <p><strong>牌名：</strong><span id="cardName">-</span></p>
          <p><strong>方向：</strong><span id="cardOrientation">-</span></p>
          <p><strong>本次主调：</strong><span id="cardKeywords">-</span></p>
          <p><strong>解读：</strong></p>
          <div id="cardReading" class="reading-box">-</div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        点击上方按钮，先抽一张牌。
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
